name: Publish

# Manual/tag-driven publish for code changes (the daily job handles registry-only releases).
# Bump the version, then either push a matching tag:
#     npm version patch && git push --follow-tags
# or run this workflow by hand from the Actions tab.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
