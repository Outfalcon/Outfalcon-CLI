name: Release

# Publishes @outfalcon/falcon via npm Trusted Publishing (OIDC) — no npm token needed.
# Three ways in:
#   • daily schedule / manual dispatch → sync the route registry from the backend; if it changed,
#     bump the patch version and publish. (Dispatch can force-publish the current version.)
#   • push a tag v*.*.* → publish the current version (manual/code-only releases).
#
# Requires:
#   • npm Trusted Publisher configured for this package → GitHub Actions, repo Outfalcon/Outfalcon-CLI,
#     workflow file release.yml.
#   • Secret BACKEND_REPO_TOKEN — a read-only PAT for the private KStartups/Mailboxy repo (registry sync).

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Publish the current version even if the registry is unchanged"
        type: boolean
        default: false
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # push the version-bump commit + tag
  id-token: write # OIDC token for npm trusted publishing

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI
        uses: actions/checkout@v4

      - name: Checkout backend route registry
        if: github.event_name != 'push' # tag releases don't re-sync
        uses: actions/checkout@v4
        with:
          repository: KStartups/Mailboxy
          token: ${{ secrets.BACKEND_REPO_TOKEN }}
          path: backend
          sparse-checkout: |
            src/api/v1/openapi.ts
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Use OIDC-capable npm
        run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1

      - run: npm ci

      - name: Sync registry from backend
        id: sync
        if: github.event_name != 'push'
        run: |
          node scripts/sync-registry.mjs backend/src/api/v1/openapi.ts
          if git diff --quiet -- src/vendor/openapi.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Registry unchanged."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Registry changed — will release."
          fi

      - name: Build & test
        run: |
          npm run build
          npm test

      - name: Bump version & push (registry changed)
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "outfalcon-bot"
          git config user.email "bot@outfalcon.dev"
          git add src/vendor/openapi.ts
          git commit -m "chore: sync route registry from backend"
          npm version patch -m "release: v%s"
          git push --follow-tags origin HEAD:main

      - name: Publish to npm (OIDC — no token)
        if: >-
          github.event_name == 'push' ||
          steps.sync.outputs.changed == 'true' ||
          inputs.force_publish
        run: npm publish --access public
