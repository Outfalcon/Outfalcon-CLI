name: Release

# Publishes @outfalcon/falcon. Three ways in:
#   • daily schedule / manual dispatch → regenerate the route registry from the PUBLIC OpenAPI spec;
#     if it changed, bump the patch version and publish. (Dispatch can force-publish current version.)
#   • push a tag v*.*.* → publish the current version (manual/code-only releases).
#
# Only secret required: NPM_TOKEN (npm Automation token). No repo/backend access needed — the registry
# is reconstructed from the public GET /api/v1/openapi.json.

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Publish the current version even if the registry is unchanged"
        type: boolean
        default: false
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # push the version-bump commit + tag

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Sync registry from public spec
        id: sync
        if: github.event_name != 'push'
        run: |
          node scripts/sync-registry.mjs
          if git diff --quiet -- src/vendor/openapi.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Registry unchanged."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Registry changed — will release."
          fi

      - name: Build & test
        run: |
          npm run build
          npm test

      - name: Bump version & push (registry changed)
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "outfalcon-bot"
          git config user.email "bot@outfalcon.dev"
          git add src/vendor/openapi.ts
          git commit -m "chore: sync route registry from public spec"
          npm version patch -m "release: v%s"
          git push --follow-tags origin HEAD:main

      - name: Publish to npm
        if: >-
          github.event_name == 'push' ||
          steps.sync.outputs.changed == 'true' ||
          inputs.force_publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
